<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .ai-gradient {
            background: linear-gradient(135-deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-4xl h-[85vh] flex flex-col glass rounded-3xl shadow-2xl overflow-hidden">
        
        <header class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
            <div>
                <h1 class="text-2xl font-bold ai-gradient">Gemini Core</h1>
                <p class="text-xs text-slate-400">Next-Gen AI Interface</p>
            </div>
            <input type="password" id="apiKey" placeholder="Enter Gemini API Key" 
                   class="bg-black/20 border border-white/10 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 transition-all w-48">
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
            <div class="flex flex-col items-center justify-center h-full text-slate-500 space-y-2" id="emptyState">
                <div class="w-12 h-12 rounded-full bg-indigo-500/20 flex items-center justify-center">✨</div>
                <p>Enter your API key and start a conversation.</p>
            </div>
        </div>

        <div class="p-6 bg-white/5 border-t border-white/10">
            <div class="relative flex items-center">
                <input type="text" id="userInput" 
                       placeholder="Type your message..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-6 pr-16 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                <button onclick="handleSend()" 
                        class="absolute right-3 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-xl font-semibold transition-all shadow-lg active:scale-95">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        window.handleSend = async function() {
            const key = document.getElementById('apiKey').value;
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const emptyState = document.getElementById('emptyState');

            if (!key) return alert("Please enter an API Key first!");
            if (!input.value.trim()) return;

            if (emptyState) emptyState.remove();

            // Add User Message
            const userMsg = input.value;
            appendMessage('user', userMsg);
            input.value = '';

            try {
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "You are a highly intelligent, sleek, and helpful AI integrated into a custom dashboard. Keep answers concise and brilliant."
                });

                const result = await model.generateContent(userMsg);
                const response = await result.response;
                appendMessage('ai', response.text());
            } catch (error) {
                appendMessage('ai', "Error: " + error.message);
            }
        };

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            msgDiv.innerHTML = `
                <div class="max-w-[80%] p-4 rounded-2xl ${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'glass text-slate-200 rounded-tl-none'}">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow 'Enter' key to send
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
