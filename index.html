<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Core | Voice & Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: radial-gradient(circle at top right, #1e293b, #0f172a);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --text: #f8fafc;
        }
        .neon-mode {
            --bg: #050505; --glass: rgba(0, 255, 157, 0.05);
            --border: rgba(0, 255, 157, 0.2); --accent: #00ff9d; --text: #00ff9d;
        }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); transition: 0.5s; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .btn-primary { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        
        /* Voice Wave Animation */
        .listening .wave {
            animation: wave 1s infinite ease-in-out;
        }
        @keyframes wave {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-6xl h-[90vh] flex glass rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10">
        
        <aside class="w-64 border-r border-white/10 hidden lg:flex flex-col p-8 bg-black/30">
            <div class="mb-10 text-center">
                <div class="inline-block p-3 rounded-2xl bg-indigo-500/10 mb-4">
                    <span class="text-3xl">🤖</span>
                </div>
                <h2 class="text-xs uppercase tracking-[0.4em] font-black opacity-40">System Node</h2>
            </div>
            
            <div class="space-y-4 flex-1">
                <div class="p-4 rounded-2xl glass text-[10px] space-y-2">
                    <p class="opacity-50">UPLINK STATE</p>
                    <p class="font-bold text-green-400">ACTIVE // SECURE</p>
                </div>
                <div class="p-4 rounded-2xl glass text-[10px] space-y-2">
                    <p class="opacity-50">BIOMETRIC LINK</p>
                    <p id="micStatus" class="font-bold text-indigo-400">MIC: STANDBY</p>
                </div>
            </div>

            <button onclick="toggleTheme()" class="glass p-4 rounded-2xl flex items-center justify-center gap-3 hover:scale-105 transition-all active:scale-95 group">
                <span id="themeIcon" class="text-lg group-hover:rotate-12 transition">🌙</span> 
                <span class="text-[10px] font-bold uppercase tracking-widest">Interface Skin</span>
            </button>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <h1 class="text-2xl font-black tracking-tighter italic">
                    GEMINI <span class="text-indigo-500 not-italic">OS</span>
                </h1>
                <div class="flex items-center gap-4">
                    <div id="listeningWave" class="hidden flex items-center gap-1 h-5 listening">
                        <div class="wave w-1 bg-indigo-400 rounded-full" style="animation-delay: 0.1s"></div>
                        <div class="wave w-1 bg-indigo-400 rounded-full" style="animation-delay: 0.2s"></div>
                        <div class="wave w-1 bg-indigo-400 rounded-full" style="animation-delay: 0.3s"></div>
                    </div>
                    <span class="text-[10px] opacity-30 font-mono">v3.0.1_STABLE</span>
                </div>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-10 space-y-8 custom-scrollbar">
                <div class="m-auto text-center" id="emptyState">
                    <h3 class="text-3xl font-light opacity-20 mb-2">Neural Link Ready</h3>
                    <p class="text-xs opacity-20 tracking-widest uppercase">Speak or type to initialize command</p>
                </div>
            </div>

            <div class="p-10 bg-white/[0.02]">
                <div class="relative glass rounded-[1.5rem] p-2 flex items-center shadow-2xl border-white/10">
                    <button id="micBtn" onclick="toggleMic()" class="p-4 hover:bg-white/5 rounded-xl transition-all group">
                        <span id="micIcon" class="text-xl opacity-50 group-hover:opacity-100 group-hover:scale-110 block">🎤</span>
                    </button>
                    
                    <input type="text" id="userInput" 
                           placeholder="Enter command or speak..." 
                           class="flex-1 bg-transparent border-none py-4 px-4 focus:outline-none text-lg placeholder:opacity-20">
                    
                    <button onclick="handleSend()" 
                            class="btn-primary px-10 py-4 rounded-xl font-black tracking-widest text-xs hover:brightness-110 active:scale-95 transition-all">
                        EXECUTE
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyAq6JE5QR3FQZnodWI9e-PkoK9MQuzVGk4";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: "You are Gemini OS. Respond with extreme intelligence and futuristic flair. Keep voice responses very concise (1-2 sentences)."
        });

        // --- THEME ENGINE ---
        window.toggleTheme = function() {
            document.body.classList.toggle('neon-mode');
            document.getElementById('themeIcon').innerText = document.body.classList.contains('neon-mode') ? '⚡' : '🌙';
        };

        // --- SPEECH RECOGNITION (Listening) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let isListening = false;

        if (recognition) {
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                handleSend();
            };
            recognition.onend = () => { stopMicUI(); };
        }

        window.toggleMic = function() {
            if (!recognition) return alert("Speech recognition not supported in this browser.");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                startMicUI();
            }
        };

        function startMicUI() {
            isListening = true;
            document.getElementById('micIcon').innerText = "⭕";
            document.getElementById('micStatus').innerText = "MIC: LISTENING";
            document.getElementById('listeningWave').classList.remove('hidden');
        }

        function stopMicUI() {
            isListening = false;
            document.getElementById('micIcon').innerText = "🎤";
            document.getElementById('micStatus').innerText = "MIC: STANDBY";
            document.getElementById('listeningWave').classList.add('hidden');
        }

        // --- SPEECH SYNTHESIS (Speaking) ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        // --- CORE CHAT LOGIC ---
        window.handleSend = async function() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const query = input.value.trim();
            if (!query) return;

            document.getElementById('emptyState').style.display = 'none';
            appendMessage('user', query);
            input.value = '';

            try {
                const result = await model.generateContent(query);
                const responseText = await result.response.text();
                
                appendMessage('ai', responseText);
                speak(responseText);
            } catch (error) {
                appendMessage('ai', "🚨 CRITICAL ERROR: Uplink desynchronized.");
            }
        };

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-4 duration-500`;
            
            const inner = role === 'user' 
                ? `<div class="bg-indigo-600 px-6 py-4 rounded-[1.5rem] rounded-tr-none shadow-xl max-w-[80%] text-sm font-medium">${text}</div>`
                : `<div class="glass px-8 py-6 rounded-[1.5rem] rounded-tl-none border-l-2 border-indigo-500 max-w-[85%]">
                    <div class="text-[9px] uppercase tracking-[0.3em] opacity-30 font-black mb-3 text-indigo-400">Core Response</div>
                    <div class="text-sm leading-relaxed opacity-90">${text}</div>
                   </div>`;
            
            msgDiv.innerHTML = inner;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
